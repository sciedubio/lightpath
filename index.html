<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="빛의 경로 시뮬레이션">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
  <title>빛의 경로 시뮬레이션</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Noto Sans KR"', 'sans-serif'] },
          colors: {
            bg: '#0f172a',       // slate-900
            main: '#06b6d4',     // cyan-500
            accent: '#8b5cf6',   // violet-500
            surface: '#1e293b'   // slate-800
          },
          animation: {
            'glow': 'glow 2s ease-in-out infinite alternate',
            'float': 'float 3s ease-in-out infinite',
          },
          keyframes: {
            glow: {
              '0%': { filter: 'drop-shadow(0 0 5px #06b6d4)' },
              '100%': { filter: 'drop-shadow(0 0 20px #06b6d4)' }
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' }
            }
          }
        }
      }
    }
  </script>

  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: 'Noto Sans KR', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .glass {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    /* Neon Text Glow */
    .text-neon {
      text-shadow: 0 0 10px rgba(6, 182, 212, 0.8), 0 0 20px rgba(6, 182, 212, 0.4);
    }
    .path-line {
      stroke: #06b6d4;
      stroke-width: 4;
      stroke-linecap: round;
      fill: none;
      filter: drop-shadow(0 0 8px #06b6d4);
    }
    .path-line-temp {
      stroke: #a855f7;
      stroke-width: 4;
      stroke-dasharray: 8 8;
      fill: none;
      filter: drop-shadow(0 0 8px #a855f7);
      pointer-events: none;
    }
    /* Hide scrollbar for clean UI */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ==========================================
    // 1. CONFIG & DATA
    // ==========================================
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6lE30REGBmM7PTNJQ9_ZC7Wo981cfkuRy_qymQVzm61LyY8QBKWwEGqIHIQwhZlM/exec"; 

    const QUIZ_POOL = [
      { q: "태양이나 전등처럼 스스로 빛을 내는 물체를 광원이라고 한다.", a: true, explain: "스스로 빛을 내는 물체를 광원이라고 합니다." },
      { q: "우리는 책장이나 텐트가 스스로 내뿜는 빛을 통해 그 물체를 본다.", a: false, explain: "스스로 빛을 내지 못하는 물체는 광원에서 나온 빛이 반사되어 우리 눈에 들어올 때 보입니다." },
      { q: "광원에서 나온 빛이 눈에 직접 들어와야만 광원을 볼 수 있다.", a: true, explain: "광원은 스스로 낸 빛이 우리 눈으로 직진해 들어올 때 보입니다." },
      { q: "달은 스스로 빛을 내는 훌륭한 광원이다.", a: false, explain: "달은 스스로 빛을 내지 않고 태양빛을 반사하여 빛나므로 광원이 아닙니다." },
      { q: "물속에 있는 물고기를 볼 때, 빛은 물과 공기의 경계면에서 굴절한다.", a: true, explain: "빛이 서로 다른 물질의 경계면을 지날 때 꺾이는 현상을 굴절이라고 합니다." },
      { q: "사과를 볼 수 있는 이유는 사과에서 반사된 빛이 우리 눈에 들어오기 때문이다.", a: true, explain: "빛이 물체에 부딪혀 튕겨 나가는 반사 현상 덕분에 물체를 볼 수 있습니다." },
      { q: "빛이 직진하다가 거울을 만나면 굴절하여 방향이 꺾인다.", a: false, explain: "거울을 만나면 굴절이 아니라 '반사'하여 방향이 꺾입니다." },
      { q: "물체에서 반사된 빛은 사방으로 퍼져 나가기 때문에 여러 사람이 동시에 물체를 볼 수 있다.", a: true, explain: "물체 표면에서 빛이 사방으로 반사(난반사)되기 때문에 여러 위치에서 볼 수 있습니다." },
      { q: "빛이 전혀 없는 아주 어두운 방 안에서는 빛을 반사할 수 없어 물체를 볼 수 없다.", a: true, explain: "광원이 없으면 반사될 빛도 없으므로 물체를 볼 수 없습니다." },
      { q: "수면 밖에서 물속의 동전을 볼 때, 동전이 실제보다 더 깊은 곳에 있는 것처럼 보인다.", a: false, explain: "빛의 굴절 때문에 물속의 물체는 실제보다 얕은 곳에 있는 것처럼 뜹니다." }
    ];

    const MISSIONS = [
      {
        id: 0,
        title: "미션 1: 광원 보기",
        desc: "광원에서 나온 빛이 눈으로 직접 들어오는 경로를 화살표로 연결하세요. (광원이 아닌 것을 주의하세요!)",
        nodes: [
          { id: 'sun', x: 200, y: 150, label: '태양(광원)', icon: '☀️', luminous: true },
          { id: 'moon', x: 200, y: 350, label: '달', icon: '🌕', luminous: false, isTrap: true, trapMessage: "달은 스스로 빛을 내지 못하므로 광원이 아닙니다. 태양 빛을 반사하여 밝게 보일 뿐입니다." },
          { id: 'eye', x: 600, y: 250, label: '관찰자(눈)', icon: '👁️', luminous: false }
        ],
        targetPaths: [{from: 'sun', to: 'eye'}]
      },
      {
        id: 1,
        title: "미션 2: 물체 보기",
        desc: "광원에서 나온 빛이 텐트(물체)에 반사되어 눈으로 들어오는 경로를 연결하세요. (장애물을 피하세요!)",
        nodes: [
          { id: 'sun', x: 150, y: 150, label: '태양(광원)', icon: '☀️', luminous: true },
          { id: 'wall', x: 400, y: 150, label: '검은 벽(장애물)', icon: '🧱', luminous: false, isTrap: true, trapMessage: "검은 벽은 빛을 흡수하고 통과시키지 않습니다. 빛이 장애물에 막히지 않고 텐트로 향하도록 연결해보세요." },
          { id: 'tent', x: 400, y: 380, label: '텐트(물체)', icon: '⛺', luminous: false },
          { id: 'eye', x: 650, y: 250, label: '관찰자(눈)', icon: '👁️', luminous: false }
        ],
        targetPaths: [{from: 'sun', to: 'tent'}, {from: 'tent', to: 'eye'}]
      },
      {
        id: 2,
        title: "미션 3: 물속 물체 보기",
        desc: "빛이 수면에서 굴절해 물고기에 닿고, 반사된 빛이 수면에서 다시 굴절해 눈으로 들어오는 4단계 경로를 완성하세요.",
        nodes: [
          { id: 'sun', x: 150, y: 100, label: '광원', icon: '☀️', luminous: true },
          { id: 'surface_in', x: 300, y: 220, label: '수면(입사)', icon: '💧', luminous: false },
          { id: 'fish', x: 400, y: 380, label: '물고기(물체)', icon: '🐟', luminous: false },
          { id: 'rock', x: 250, y: 350, label: '물속 바위(장애물)', icon: '🪨', luminous: false, isTrap: true, trapMessage: "바위는 빛을 차단해버립니다. 빛이 물고기에 바로 닿을 수 있는 입사/굴절 지점을 찾아보세요." },
          { id: 'surface_out', x: 500, y: 220, label: '수면(굴절)', icon: '💧', luminous: false },
          { id: 'eye', x: 650, y: 100, label: '관찰자(눈)', icon: '👁️', luminous: false }
        ],
        targetPaths: [
          {from: 'sun', to: 'surface_in'},
          {from: 'surface_in', to: 'fish'},
          {from: 'fish', to: 'surface_out'},
          {from: 'surface_out', to: 'eye'}
        ]
      }
    ];

    const ESSAY_QUESTIONS = [
      "1. 눈을 감으면 물체를 볼 수 있나요? 그 이유는 무엇일까요?",
      "2. 눈을 감았다가 뜨면 물체를 볼 수 있나요? 그 이유는 무엇일까요?",
      "3. 빛이 하나도 없는 곳에서 물체를 볼 수 있나요? 그 이유는 무엇일까요?",
      "4. 물체를 보기 위해서 반드시 필요한 것은 무엇인가요? 그 이유는 무엇인가요?",
      "5. 우리가 눈으로 물체를 보는 원리를 구체적으로 적어주세요.",
      "6. 스마트폰에서 액정화면이 보이는 이유는 무엇일까요?",
      "7. 영상('본다는 것은 무엇일까?')에서 말하고자 하는 건 무엇일까요?"
    ];

    // ==========================================
    // 2. COMPONENTS
    // ==========================================

    // Shared UI Components
    const Button = ({ onClick, children, variant = 'primary', className = '', disabled = false }) => {
      const baseStyle = "px-6 py-3 rounded-full font-bold transition-all duration-150 active:scale-95 shadow-lg whitespace-nowrap disabled:opacity-50 disabled:active:scale-100 disabled:cursor-not-allowed";
      const variants = {
        primary: "bg-gradient-to-r from-main to-blue-500 text-white hover:shadow-[0_0_15px_rgba(6,182,212,0.5)]",
        secondary: "bg-surface border border-white/20 text-white hover:bg-white/10",
        accent: "bg-gradient-to-r from-accent to-pink-500 text-white hover:shadow-[0_0_15px_rgba(168,85,247,0.5)]"
      };
      return (
        <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`} disabled={disabled}>
          {children}
        </button>
      );
    };

    const ModalOverlay = ({ children, onClose }) => (
      <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" onClick={onClose}>
        <div className="max-h-[90vh] overflow-y-auto rounded-3xl w-full max-w-lg" onClick={e => e.stopPropagation()}>
          {children}
        </div>
      </div>
    );

    // Custom Alert
    const AlertModal = ({ isOpen, message, onClose }) => {
      if (!isOpen) return null;
      return (
        <ModalOverlay onClose={onClose}>
          <div className="glass p-8 text-center flex flex-col items-center gap-6">
            <div className="text-4xl">⚠️</div>
            <p className="text-lg font-medium whitespace-pre-wrap leading-relaxed">{message}</p>
            <Button onClick={onClose} variant="primary">확인</Button>
          </div>
        </ModalOverlay>
      );
    };

    // Teacher Guide Modal
    const AdminGuideModal = ({ isOpen, onClose }) => {
      if (!isOpen) return null;
      const copyCode = () => {
        const code = `function doPost(e) {\n  try {\n    const sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();\n    const data = JSON.parse(e.postData.contents);\n    sheet.appendRow([\n      new Date(),\n      data.studentId || "",\n      data.studentName || "",\n      data.minValue ?? "",\n      data.maxValue ?? "",\n      data.quizScore ?? "",\n      data.q1 || "", data.q2 || "", data.q3 || "", data.q4 || "", data.q5 || "", data.q6 || "", data.q7 || ""\n    ]);\n    return ContentService.createTextOutput(JSON.stringify({result:"success"}))\n      .setMimeType(ContentService.MimeType.JSON);\n  } catch (err) {\n    return ContentService.createTextOutput(JSON.stringify({result:"error", message: err.message}))\n      .setMimeType(ContentService.MimeType.JSON);\n  }\n}`;
        
        // iframe 환경 호환성을 위해 execCommand('copy') 방식 사용
        const textArea = document.createElement("textarea");
        textArea.value = code;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        textArea.style.top = "0";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand('copy');
          alert("복사되었습니다!");
        } catch (err) {
          console.error("복사 실패", err);
          alert("자동 복사에 실패했습니다. 코드를 직접 드래그해서 복사해주세요.");
        }
        document.body.removeChild(textArea);
      };

      return (
        <ModalOverlay onClose={onClose}>
          <div className="glass p-6 text-sm flex flex-col gap-4 text-slate-200">
            <div className="flex justify-between items-center border-b border-white/20 pb-3">
              <h2 className="text-xl font-bold text-main">DB 연동 및 관리자 가이드</h2>
              <button onClick={onClose} className="text-2xl hover:text-white">&times;</button>
            </div>
            
            <div className="space-y-4">
              <section>
                <h3 className="font-bold text-white mb-1">① 구글 시트 준비</h3>
                <p>1행 헤더를 다음 순서로 작성하세요:<br/>
                <code className="bg-black/50 px-2 py-1 rounded text-accent text-[11px] break-all">timestamp | studentId | studentName | min | max | quiz | Q1 | Q2 | Q3 | Q4 | Q5 | Q6 | Q7</code></p>
              </section>

              <section>
                <h3 className="font-bold text-white mb-1 flex justify-between items-center">
                  ② Apps Script 코드
                  <button onClick={copyCode} className="bg-white/10 px-3 py-1 rounded hover:bg-white/20 text-xs">복사</button>
                </h3>
                <pre className="bg-black/50 p-3 rounded overflow-x-auto text-xs text-green-300">
{`function doPost(e) {
  try {
    const sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
    const data = JSON.parse(e.postData.contents);
    sheet.appendRow([
      new Date(), data.studentId || "", data.studentName || "",
      data.minValue ?? "", data.maxValue ?? "",
      data.quizScore ?? "", 
      data.q1||"", data.q2||"", data.q3||"", data.q4||"", data.q5||"", data.q6||"", data.q7||""
    ]);
    return ContentService.createTextOutput(JSON.stringify({result:"success"}))
      .setMimeType(ContentService.MimeType.JSON);
  } catch (err) {
    return ContentService.createTextOutput(JSON.stringify({result:"error"}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}`}
                </pre>
              </section>

              <section>
                <h3 className="font-bold text-white mb-1">③ 배포 방법</h3>
                <ol className="list-decimal pl-4 space-y-1">
                  <li>Apps Script 에디터 우측 상단 <b>배포</b> &gt; <b>새 배포</b></li>
                  <li>유형: <b>웹 앱</b></li>
                  <li>액세스: <b>모든 사용자</b>, 실행: <b>나</b></li>
                  <li>배포 후 발급된 URL을 소스코드의 <code className="text-accent">GOOGLE_SCRIPT_URL</code>에 붙여넣습니다.</li>
                </ol>
              </section>

              <section>
                <h3 className="font-bold text-white mb-1">④ 홈 화면에 추가 (PWA)</h3>
                <ul className="list-disc pl-4 space-y-1">
                  <li><b>iOS (Safari):</b> 하단 공유(📤) 버튼 &gt; '홈 화면에 추가'</li>
                  <li><b>Android (Chrome):</b> 우측 상단 메뉴(⋮) &gt; '홈 화면에 추가'</li>
                </ul>
              </section>
            </div>
            <div className="text-center mt-4 pt-4 border-t border-white/20 text-xs text-white/50">
              Created by Yang DH
            </div>
          </div>
        </ModalOverlay>
      );
    };

    // ==========================================
    // 3. MAIN APP
    // ==========================================
    const App = () => {
      const [view, setView] = useState('intro'); // intro, simulation, report, done
      const [isGuideOpen, setIsGuideOpen] = useState(false);
      const [alertMsg, setAlertMsg] = useState('');
      
      // Auto-save State Init (localStorage)
      const [studentData, setStudentData] = useState(() => {
        try {
          const saved = localStorage.getItem('science_sim_student');
          return saved ? JSON.parse(saved) : { id: '', name: '' };
        } catch(e) { return { id: '', name: '' }; }
      });
      
      const [answers, setAnswers] = useState(() => {
        try {
          const saved = localStorage.getItem('science_sim_answers');
          return saved ? JSON.parse(saved) : Array(7).fill('');
        } catch(e) { return Array(7).fill(''); }
      });

      const [quizQuests, setQuizQuests] = useState([]);
      const [quizAnswers, setQuizAnswers] = useState([null, null, null]);
      const [quizScore, setQuizScore] = useState(0);
      const [missionRecords, setMissionRecords] = useState([]);
      const [isSubmitting, setIsSubmitting] = useState(false);

      const showAlert = (msg) => setAlertMsg(msg);
      
      // Auto-save logic hooks
      useEffect(() => {
        localStorage.setItem('science_sim_student', JSON.stringify(studentData));
      }, [studentData]);

      useEffect(() => {
        localStorage.setItem('science_sim_answers', JSON.stringify(answers));
      }, [answers]);

      // Shuffle Quizzes on Mount
      useEffect(() => {
        const shuffled = [...QUIZ_POOL].sort(() => 0.5 - Math.random()).slice(0, 3);
        setQuizQuests(shuffled);
      }, []);

      const submitData = () => {
        const { id, name } = studentData;
        if (!id || !name) {
          showAlert("학번과 이름을 모두 입력해주세요.");
          return;
        }

        if (answers.some(a => a.trim() === '')) {
          showAlert("활동지 질문 7개에 모두 답변을 작성해주세요.\n(어려운 질문은 간략하게라도 적어보세요!)");
          return;
        }
        
        let currentScore = 0;
        quizAnswers.forEach((ans, idx) => {
          if (ans === quizQuests[idx].a) currentScore++;
        });

        if (quizAnswers.includes(null)) {
          showAlert("모든 OX 퀴즈를 풀어주세요.");
          return;
        }

        if (!GOOGLE_SCRIPT_URL) {
          showAlert("DB 연결 URL이 설정되지 않았습니다.\n우측 상단의 가이드를 참고하여 GOOGLE_SCRIPT_URL을 설정해주세요.");
          return;
        }

        setIsSubmitting(true);
        const payload = {
          timestamp: new Date().toISOString(),
          studentId: id,
          studentName: name,
          minValue: missionRecords.length > 0 ? Math.min(...missionRecords) : 0,
          maxValue: missionRecords.length > 0 ? Math.max(...missionRecords) : 0,
          quizScore: currentScore,
          q1: answers[0], q2: answers[1], q3: answers[2], 
          q4: answers[3], q5: answers[4], q6: answers[5], q7: answers[6]
        };

        fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        })
        .then(() => {
          setTimeout(() => {
            // 제출 성공 시 임시 저장 초기화
            localStorage.removeItem('science_sim_student');
            localStorage.removeItem('science_sim_answers');
            
            setQuizScore(currentScore);
            setIsSubmitting(false);
            setView('done');
          }, 1500);
        })
        .catch(err => {
          console.error(err);
          showAlert("데이터 전송 중 오류가 발생했습니다.");
          setIsSubmitting(false);
        });
      };

      // === Render Views ===
      
      const renderIntro = () => (
        <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
          <div className="glass p-10 rounded-3xl max-w-lg w-full flex flex-col items-center animate-[float_4s_ease-in-out_infinite]">
            <div className="text-6xl mb-6 flex gap-4">
              ☀️ <span className="animate-pulse">➡️</span> 👁️
            </div>
            <h1 className="text-4xl font-black mb-4 text-neon">빛의 경로 시뮬레이션</h1>
            <p className="text-slate-300 mb-8 leading-relaxed">
              우리가 물체를 보기 위해 빛은 어떤 경로로 이동할까요?<br/>
              광원, 일반 물체, 물속 물체를 볼 때의<br/>
              빛의 이동 경로를 화살표로 연결해보며 알아봅시다.
            </p>
            <Button onClick={() => setView('simulation')} className="text-xl px-10 py-4">실험 시작하기</Button>
          </div>
          <div className="mt-12 text-slate-500 font-medium">Created by Yang DH</div>
        </div>
      );

      const renderSimulation = () => {
        return <Simulation 
          onComplete={(records) => { setMissionRecords(records); setView('report'); }} 
          showAlert={showAlert} 
        />;
      };

      const renderReport = () => (
        <div className="min-h-screen p-6 pb-20 max-w-2xl mx-auto flex flex-col gap-6">
          <div className="text-center mb-4 mt-8">
            <h2 className="text-3xl font-bold text-neon mb-2">실험 보고서</h2>
            <p className="text-slate-400">실험 결과를 정리하고 퀴즈를 풀어보세요.</p>
          </div>

          <div className="glass p-6 rounded-2xl flex flex-col gap-4">
            <div className="flex justify-between items-end border-b border-white/10 pb-2">
              <h3 className="text-xl font-bold text-main">기본 정보</h3>
              <span className="text-xs text-slate-400">입력된 내용은 자동 저장됩니다.</span>
            </div>
            <div className="flex gap-4">
              <input type="number" placeholder="학번 (예: 2101)" className="w-1/3 bg-black/30 border border-white/20 rounded-lg p-3 text-white placeholder-slate-400 focus:outline-none focus:border-main"
                value={studentData.id} onChange={e => setStudentData({...studentData, id: e.target.value})} />
              <input type="text" placeholder="이름" className="w-2/3 bg-black/30 border border-white/20 rounded-lg p-3 text-white placeholder-slate-400 focus:outline-none focus:border-main"
                value={studentData.name} onChange={e => setStudentData({...studentData, name: e.target.value})} />
            </div>
          </div>

          <div className="glass p-6 rounded-2xl flex flex-col gap-4">
            <h3 className="text-xl font-bold text-main border-b border-white/10 pb-2">실험 결과 요약</h3>
            <div className="grid grid-cols-3 gap-4 text-center">
              <div className="bg-black/30 p-4 rounded-xl">
                <div className="text-slate-400 text-sm">최단 해결 시간</div>
                <div className="text-2xl font-bold text-white">{Math.min(...missionRecords)}초</div>
              </div>
              <div className="bg-black/30 p-4 rounded-xl">
                <div className="text-slate-400 text-sm">최장 해결 시간</div>
                <div className="text-2xl font-bold text-white">{Math.max(...missionRecords)}초</div>
              </div>
              <div className="bg-black/30 p-4 rounded-xl">
                <div className="text-slate-400 text-sm">평균 해결 시간</div>
                <div className="text-2xl font-bold text-white">{(missionRecords.reduce((a,b)=>a+b,0)/3).toFixed(1)}초</div>
              </div>
            </div>
          </div>

          <div className="glass p-6 rounded-2xl flex flex-col gap-6">
            <div className="flex justify-between items-end border-b border-white/10 pb-2">
              <h3 className="text-xl font-bold text-main">탐구 활동지</h3>
              <span className="text-xs text-slate-400">입력된 내용은 자동 저장됩니다.</span>
            </div>
            <div className="flex flex-col gap-4">
              {ESSAY_QUESTIONS.map((q, idx) => (
                <div key={idx} className="flex flex-col gap-2">
                  <label className="text-[15px] font-medium text-slate-200 leading-snug">{q}</label>
                  <input type="text" placeholder="답변을 입력하세요..." 
                    className="w-full bg-black/30 border border-white/20 rounded-lg p-3 text-white placeholder-slate-500 focus:outline-none focus:border-main text-sm transition-colors"
                    value={answers[idx]} 
                    onChange={e => {
                      const newAns = [...answers];
                      newAns[idx] = e.target.value;
                      setAnswers(newAns);
                    }} 
                  />
                </div>
              ))}
            </div>
          </div>

          <div className="glass p-6 rounded-2xl flex flex-col gap-6">
            <h3 className="text-xl font-bold text-main border-b border-white/10 pb-2">개념 확인 OX 퀴즈</h3>
            {quizQuests.map((q, idx) => (
              <div key={idx} className="flex flex-col gap-3">
                <p className="text-lg leading-relaxed"><span className="text-accent font-bold">Q{idx+1}.</span> {q.q}</p>
                <div className="flex gap-4">
                  <button onClick={() => {const newA = [...quizAnswers]; newA[idx] = true; setQuizAnswers(newA);}}
                    className={`flex-1 py-3 rounded-xl font-bold text-xl transition-all ${quizAnswers[idx] === true ? 'bg-main text-white shadow-[0_0_10px_#06b6d4]' : 'bg-black/30 text-slate-400 border border-white/10 hover:bg-white/5'}`}>O</button>
                  <button onClick={() => {const newA = [...quizAnswers]; newA[idx] = false; setQuizAnswers(newA);}}
                    className={`flex-1 py-3 rounded-xl font-bold text-xl transition-all ${quizAnswers[idx] === false ? 'bg-pink-500 text-white shadow-[0_0_10px_#ec4899]' : 'bg-black/30 text-slate-400 border border-white/10 hover:bg-white/5'}`}>X</button>
                </div>
                {quizAnswers[idx] !== null && (
                  <div className={`p-3 rounded-lg text-sm ${quizAnswers[idx] === q.a ? 'bg-green-500/20 text-green-200 border border-green-500/30' : 'bg-red-500/20 text-red-200 border border-red-500/30'}`}>
                    {quizAnswers[idx] === q.a ? '🎉 정답입니다! ' : '❌ 오답입니다! '}
                    <span className="opacity-80">{q.explain}</span>
                  </div>
                )}
              </div>
            ))}
          </div>

          <Button onClick={submitData} className="w-full text-lg py-4 flex items-center justify-center gap-2" disabled={isSubmitting}>
            {isSubmitting ? <span className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></span> : '결과 제출하기'}
          </Button>
        </div>
      );

      const renderDone = () => (
        <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
          <div className="glass p-10 rounded-3xl max-w-md w-full flex flex-col items-center">
            <div className="text-6xl mb-6 animate-bounce">🎉</div>
            <h1 className="text-3xl font-black mb-4 text-neon">제출 완료!</h1>
            <p className="text-slate-300 mb-6">
              수고하셨습니다. <br/>
              퀴즈 점수: <span className="text-main font-bold text-xl">{quizScore} / 3</span>점
            </p>
            <Button onClick={() => window.location.reload()} variant="secondary" className="w-full">처음으로 돌아가기</Button>
          </div>
          <div className="mt-12 text-slate-500 font-medium">Created by Yang DH</div>
        </div>
      );

      return (
        <div className="relative min-h-screen selection:bg-main selection:text-white">
          {/* Global Header / Admin Guide Button */}
          <div className="absolute top-4 right-4 z-40">
            <button onClick={() => setIsGuideOpen(true)} className="bg-white/10 hover:bg-white/20 backdrop-blur-md px-4 py-2 rounded-full text-sm font-bold text-white/80 transition-colors border border-white/10 shadow-lg">
              🛠️ DB 연동 가이드
            </button>
          </div>

          {view === 'intro' && renderIntro()}
          {view === 'simulation' && renderSimulation()}
          {view === 'report' && renderReport()}
          {view === 'done' && renderDone()}

          <AdminGuideModal isOpen={isGuideOpen} onClose={() => setIsGuideOpen(false)} />
          <AlertModal isOpen={!!alertMsg} message={alertMsg} onClose={() => setAlertMsg('')} />
        </div>
      );
    };

    // ==========================================
    // 4. SIMULATION COMPONENT (SVG Interaction)
    // ==========================================
    const Simulation = ({ onComplete, showAlert }) => {
      const [missionIdx, setMissionIdx] = useState(0);
      const [paths, setPaths] = useState([]);
      const [activeNode, setActiveNode] = useState(null);
      const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
      const [startTime, setStartTime] = useState(Date.now());
      const [records, setRecords] = useState([]);
      const [isSuccess, setIsSuccess] = useState(false);
      const [isDark, setIsDark] = useState(false); // 다크 모드 (방 불 끄기)
      
      const svgRef = useRef(null);
      const mission = MISSIONS[missionIdx];

      // Update Mouse Position for dragging
      const handlePointerMove = (e) => {
        if (!activeNode || !svgRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        // SVG viewBox is 0 0 800 500
        const x = ((e.clientX - rect.left) / rect.width) * 800;
        const y = ((e.clientY - rect.top) / rect.height) * 500;
        setMousePos({ x, y });
      };

      const handleNodeDown = (e, nodeId) => {
        e.stopPropagation();
        if (isSuccess) return;
        setActiveNode(nodeId);
        
        // Initial pos
        const rect = svgRef.current.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 800;
        const y = ((e.clientY - rect.top) / rect.height) * 500;
        setMousePos({ x, y });
      };

      const handlePointerUp = () => {
        if (activeNode) {
          // Find which node we dropped on based on coordinates
          let targetNodeId = null;
          for (let i = 0; i < mission.nodes.length; i++) {
            const node = mission.nodes[i];
            const dx = mousePos.x - node.x;
            const dy = mousePos.y - node.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            // Node hit radius extended to 55 for easier mobile touch
            if (dist <= 55) {
              targetNodeId = node.id;
              break;
            }
          }

          if (targetNodeId && targetNodeId !== activeNode) {
            const exists = paths.some(p => p.from === activeNode && p.to === targetNodeId);
            if (!exists) {
              setPaths([...paths, { from: activeNode, to: targetNodeId }]);
            }
          }
        }
        setActiveNode(null); // Cancel dragging
      };

      const resetPaths = () => {
        if (isSuccess) return;
        setPaths([]);
      };

      const checkAnswer = () => {
        // 1. 함정(Trap) 노드가 연결되었는지 먼저 검사
        const usedNodeIds = paths.flatMap(p => [p.from, p.to]);
        const trappedNode = mission.nodes.find(n => n.isTrap && usedNodeIds.includes(n.id));
        
        if (trappedNode) {
          showAlert(`🚫 앗, 함정입니다!\n\n${trappedNode.trapMessage}`);
          return;
        }

        // 2. 정답 경로 검사
        const target = mission.targetPaths;
        
        // Check length
        if (paths.length !== target.length) {
          showAlert("경로가 올바르지 않거나 덜 연결되었습니다.\n미션 설명을 다시 읽고 모든 과정을 순서대로 연결해보세요.");
          return;
        }

        // Check if every target path exists in user paths
        const isCorrect = target.every(t => 
          paths.some(p => p.from === t.from && p.to === t.to)
        );

        if (isCorrect) {
          const timeTaken = Math.floor((Date.now() - startTime) / 1000);
          const newRecords = [...records, timeTaken];
          setRecords(newRecords);
          setIsSuccess(true);
        } else {
          showAlert("연결 방향이나 순서가 잘못되었습니다.\n빛이 출발하는 곳에서 도착하는 곳으로 차례대로 화살표를 그려보세요.");
        }
      };

      const nextMission = () => {
        if (missionIdx < 2) {
          setMissionIdx(missionIdx + 1);
          setPaths([]);
          setIsSuccess(false);
          setIsDark(false); // 다음 미션 이동 시 조명 켜기
          setStartTime(Date.now());
        } else {
          onComplete(records);
        }
      };

      const activeNodeObj = mission.nodes.find(n => n.id === activeNode);

      return (
        <div className="min-h-screen p-4 sm:p-8 flex flex-col pt-16">
          {/* Header */}
          <div className="max-w-5xl mx-auto w-full flex flex-col gap-4 mb-6">
            <div className="flex items-center gap-4">
              <div className="bg-main/20 text-main font-bold px-4 py-1.5 rounded-full border border-main/30">
                Step {missionIdx + 1} / 3
              </div>
              <h2 className="text-2xl sm:text-3xl font-black text-white">{mission.title}</h2>
            </div>
            <p className="text-slate-300 text-lg bg-white/5 p-4 rounded-xl border border-white/10">
              💡 {mission.desc}
            </p>
          </div>

          {/* Canvas Area */}
          <div className="max-w-5xl mx-auto w-full flex-1 flex flex-col relative">
            <div className={`glass rounded-3xl flex-1 relative overflow-hidden shadow-2xl border transition-colors duration-700 ${isDark ? 'border-black/50' : 'border-white/20'}`}>
              
              {/* Instructions overlay for desktop */}
              <div className="absolute top-4 left-4 text-sm text-slate-400 bg-black/40 px-3 py-1 rounded-full pointer-events-none z-10 transition-opacity">
                아이콘을 드래그하여 빛의 이동 경로를 화살표로 연결하세요.
              </div>

              {/* Light Switch Toggle */}
              <div className="absolute top-4 right-4 z-10">
                <button onClick={() => setIsDark(!isDark)}
                  className={`flex items-center gap-2 px-4 py-2 rounded-full border backdrop-blur-sm transition-all shadow-lg active:scale-95 ${
                    isDark ? 'bg-white/90 text-black border-white' : 'bg-black/60 text-white border-white/20 hover:bg-black/80'
                  }`}>
                  <span className="text-xl">{isDark ? '💡' : '🌙'}</span>
                  <span className="text-sm font-bold">{isDark ? '방 불 켜기' : '방 불 끄기'}</span>
                </button>
              </div>

              <svg 
                ref={svgRef}
                viewBox="0 0 800 500" 
                className="w-full h-full touch-none select-none"
                style={{ touchAction: 'none' }}
                onPointerMove={handlePointerMove}
                onPointerUp={handlePointerUp}
                onPointerLeave={handlePointerUp}
              >
                <defs>
                  {/* Arrow marker for permanent paths */}
                  <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4" />
                  </marker>
                  {/* Arrow marker for dragging path */}
                  <marker id="arrowhead-temp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7" />
                  </marker>
                </defs>

                {/* Dark Mode Overlay */}
                <rect x="0" y="0" width="800" height="500" fill="black" opacity={isDark ? 0.85 : 0} className="transition-opacity duration-700 pointer-events-none" />

                {/* Backgrounds / Environment Graphics */}
                {missionIdx === 2 && (
                  <rect x="0" y="220" width="800" height="280" fill="rgba(6, 182, 212, 0.15)" className={isDark ? "opacity-30" : ""} />
                )}

                {/* Finished Paths */}
                {paths.map((p, i) => {
                  const fromNode = mission.nodes.find(n => n.id === p.from);
                  const toNode = mission.nodes.find(n => n.id === p.to);
                  if(!fromNode || !toNode) return null;
                  
                  // Calculate intersection point with target node circle (radius 30)
                  const dx = toNode.x - fromNode.x;
                  const dy = toNode.y - fromNode.y;
                  const angle = Math.atan2(dy, dx);
                  const targetX = toNode.x - Math.cos(angle) * 35;
                  const targetY = toNode.y - Math.sin(angle) * 35;

                  return (
                    <line key={`path-${i}`} x1={fromNode.x} y1={fromNode.y} x2={targetX} y2={targetY} 
                          className={`path-line ${isDark ? 'opacity-30' : ''}`} markerEnd="url(#arrowhead)" />
                  );
                })}

                {/* Light Particle Animations (Show on Success) */}
                {isSuccess && paths.map((p, i) => {
                  const fromNode = mission.nodes.find(n => n.id === p.from);
                  const toNode = mission.nodes.find(n => n.id === p.to);
                  if(!fromNode || !toNode) return null;
                  const dx = toNode.x - fromNode.x;
                  const dy = toNode.y - fromNode.y;
                  const angle = Math.atan2(dy, dx);
                  const targetX = toNode.x - Math.cos(angle) * 35;
                  const targetY = toNode.y - Math.sin(angle) * 35;

                  return (
                    <circle key={`particle-${i}`} r="5" fill="#fff" filter="drop-shadow(0 0 8px #fff)" className="pointer-events-none">
                      <animate attributeName="cx" values={`${fromNode.x};${targetX}`} dur="1.2s" repeatCount="indefinite" />
                      <animate attributeName="cy" values={`${fromNode.y};${targetY}`} dur="1.2s" repeatCount="indefinite" />
                      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="1.2s" repeatCount="indefinite" />
                    </circle>
                  );
                })}

                {/* Dragging Temp Path */}
                {activeNodeObj && (
                  <line x1={activeNodeObj.x} y1={activeNodeObj.y} x2={mousePos.x} y2={mousePos.y} 
                        className="path-line-temp" markerEnd="url(#arrowhead-temp)" />
                )}

                {/* Nodes */}
                {mission.nodes.map(node => {
                  // 다크모드일 때, 광원이 아니면 opacity를 낮춤
                  const nodeOpacity = (isDark && !node.luminous) ? 0.15 : 1;
                  return (
                    <g key={node.id} 
                       transform={`translate(${node.x}, ${node.y})`} 
                       className="cursor-pointer transition-opacity duration-700"
                       style={{ opacity: nodeOpacity }}
                       onPointerDown={(e) => handleNodeDown(e, node.id)}
                    >
                      <circle cx="0" cy="0" r="35" 
                              fill="rgba(30,41,59,0.9)" 
                              stroke={activeNode === node.id ? "#a855f7" : "#334155"} 
                              strokeWidth="3" 
                              className="transition-colors" />
                      <text x="0" y="4" textAnchor="middle" dominantBaseline="middle" fontSize="30" className="pointer-events-none">{node.icon}</text>
                      <rect x="-40" y="42" width="80" height="24" rx="12" fill="rgba(0,0,0,0.6)" className="pointer-events-none" />
                      <text x="0" y="54" textAnchor="middle" fill="#f8fafc" fontSize="12" fontWeight="bold" className="pointer-events-none">{node.label}</text>
                    </g>
                  );
                })}
              </svg>

              {/* Success Overlay */}
              {isSuccess && (
                <div className="absolute inset-0 bg-black/50 backdrop-blur-[2px] flex flex-col items-center justify-center z-20 animate-[fadeIn_0.3s_ease-out]">
                  <div className="text-6xl mb-4">🌟</div>
                  <h3 className="text-3xl font-black text-neon mb-6">정답입니다!</h3>
                  <Button onClick={nextMission} variant="primary" className="text-xl px-10">
                    {missionIdx < 2 ? '다음 미션으로' : '보고서 작성하기'}
                  </Button>
                </div>
              )}
            </div>

            {/* Bottom Controls */}
            <div className="mt-6 flex justify-between items-center bg-surface/50 p-4 rounded-2xl border border-white/10">
              <Button onClick={resetPaths} variant="secondary" className="px-8" disabled={isSuccess}>초기화</Button>
              <div className="text-slate-400 font-mono">
                연결된 경로: {paths.length}개
              </div>
              <Button onClick={checkAnswer} variant="accent" className="px-8" disabled={isSuccess || paths.length === 0}>정답 확인</Button>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
